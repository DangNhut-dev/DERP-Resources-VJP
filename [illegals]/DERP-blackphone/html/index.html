<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERP BlackPhone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/phone.css">
    <link rel="stylesheet" href="css/lockscreen.css">
    <link rel="stylesheet" href="css/homescreen.css">
    <link rel="stylesheet" href="css/appview.css">
    <link rel="stylesheet" href="css/notification.css">
</head>
<body>
    <!-- Notification banner container (hien thi ngay ca khi phone dong) -->
    <div id="notif-container"></div>

    <div id="phone-wrapper" class="hidden">
        <div id="phone-device">
            <div class="phone-notch">
                <div class="notch-camera"></div>
                <div class="notch-speaker"></div>
            </div>
            <div class="phone-side-btn phone-side-btn--power"></div>
            <div class="phone-side-btn phone-side-btn--vol-up"></div>
            <div class="phone-side-btn phone-side-btn--vol-down"></div>

            <div class="phone-screen">
                <!-- Status bar -->
                <div class="status-bar">
                    <div class="status-time" id="status-time">00:00</div>
                    <div class="status-icons">
                        <i class="fa-solid fa-signal"></i>
                        <i class="fa-solid fa-wifi"></i>
                        <div class="battery">
                            <div class="battery-level"></div>
                        </div>
                    </div>
                </div>

                <!-- Lock Screen -->
                <div class="screen screen--lock active" id="screen-lock">
                    <div class="lock-bg"></div>
                    <div class="lock-content">
                        <div class="lock-brand">
                            <span class="brand-mark">D</span>
                            <span class="brand-text">DERP</span>
                        </div>
                        <div class="lock-time" id="lock-time">00:00</div>
                        <div class="lock-date" id="lock-date">—</div>
                        <div class="lock-divider"></div>
                        <div class="lock-hint">
                            <i class="fa-solid fa-chevron-up"></i>
                            <span>Vuốt lên để mở khóa</span>
                        </div>
                    </div>
                </div>

                <!-- Home Screen -->
                <div class="screen screen--home" id="screen-home">
                    <div class="home-bg"></div>
                    <div class="home-header">
                        <div class="home-greeting">
                            <span class="greeting-small">Xin chào</span>
                            <span class="greeting-big" id="home-greeting-time">Buổi tối</span>
                        </div>
                        <div class="home-date" id="home-date">—</div>
                    </div>

                    <div class="app-grid" id="app-grid"></div>

                    <div class="home-dock">
                        <div class="dock-pill"></div>
                    </div>
                </div>

                <!-- App View -->
                <div class="screen screen--app" id="screen-app">
                    <div class="app-header">
                        <button class="app-back" id="app-back" aria-label="Back">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        <div class="app-title" id="app-title">App</div>
                        <div class="app-header-spacer"></div>
                    </div>
                    <div class="app-body" id="app-body">
                        <div class="app-placeholder">
                            <div class="placeholder-icon"><i class="fa-regular fa-circle-dot"></i></div>
                            <div class="placeholder-title">App chưa được cài đặt</div>
                            <div class="placeholder-sub">Nội dung sẽ được nạp khi app sẵn sàng.</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/notification.js"></script>
    <script src="js/phone.js"></script>
    <script src="js/apps.js"></script>
</body>
</html>
