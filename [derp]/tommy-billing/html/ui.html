<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; overflow: hidden; }

        /* Main Container */
        .billing-container {
            display: none;
            position: fixed;
            top: 50%;
            left: 70%;
            transform: translate(-50%, -50%);
            width: 440px;
            min-width: 500px;
            max-width: 600px;
            height: 700px;
            min-height: 700px;
            max-height: 95vh;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
        }
        .billing-container.show { display: block; }

        @keyframes slideUp {
            from { transform: translate(-50%, -50%) translateY(30px); opacity: 0; }
            to { transform: translate(-50%, -50%) translateY(0); opacity: 1; }
        }

        .billing-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 15px;
            background: repeating-linear-gradient(135deg, #fff 0px, #fff 10px, transparent 10px, transparent 20px);
        }
        .billing-container::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 15px;
            background: repeating-linear-gradient(45deg, #fff 0px, #fff 10px, transparent 10px, transparent 20px);
        }

        .receipt-paper {
            padding: 25px 20px 20px;
            background: linear-gradient(to bottom, transparent 0%, transparent 2px, #f8f8f8 2px, #f8f8f8 100%);
            background-size: 100% 25px;
            height: calc(100% - 30px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .receipt-paper::-webkit-scrollbar { display: none; }

        /* Header */
        .billing-header {
            text-align: center;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px dashed #333;
        }
        .billing-title { font-size: 26px; font-weight: 700; color: #000; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 3px; }
        .billing-subtitle { color: #666; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .close-btn {
            position: absolute; top: 20px; right: 15px;
            background: transparent; border: none; font-size: 20px;
            cursor: pointer; color: #999; transition: all 0.3s; z-index: 10;
        }
        .close-btn:hover { color: #000; transform: rotate(90deg); }

        /* Tabs */
        .tabs { display: flex; border-bottom: 2px solid #000; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 10px 4px;
            background: transparent; border: none; color: #666;
            cursor: pointer; font-size: 10px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0;
            transition: all 0.3s; font-family: 'Courier New', monospace;
            border-bottom: 3px solid transparent; margin-bottom: -2px;
            display: flex; flex-direction: column; align-items: center; gap: 3px;
        }
        .tab i { font-size: 16px; }
        .tab:hover { color: #000; }
        .tab.active { color: #000; border-bottom-color: #000; }
        .tab.hidden { display: none; }
        .tab-badge { background: #c0392b; color: #fff; font-size: 10px; padding: 2px 5px; border-radius: 6px; font-weight: 700; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Filter Bar */
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .filter-input {
            flex: 1;
            min-width: 120px;
            padding: 8px 12px;
            border: 1px solid #000;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            background: #fff;
        }
        .filter-input:focus { outline: none; border-color: #3498db; }
        .filter-select {
            padding: 8px 10px;
            border: 1px solid #000;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            background: #fff;
            cursor: pointer;
        }

        /* Compact Bill List */
        .bill-list-compact { display: flex; flex-direction: column; gap: 6px; }

        .bill-row {
            display: grid;
            grid-template-columns: 90px 1fr 70px 70px;
            align-items: center;
            padding: 10px 12px;
            background: #fffef7;
            border-left: 4px solid #000;
            cursor: pointer;
            transition: all 0.2s;
            gap: 8px;
        }
        .bill-row:hover { background: #f5f5dc; transform: translateX(3px); }
        .bill-row.pending { border-left-color: #f39c12; }
        .bill-row.paid { border-left-color: #27ae60; }
        .bill-row.rejected { border-left-color: #c0392b; }
        .bill-row.cancelled { border-left-color: #95a5a6; }
        .bill-row.auto_paid { border-left-color: #3498db; }

        .bill-row-id { font-size: 11px; font-weight: 700; color: #000; }
        .bill-row-name { font-size: 12px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bill-row-date { font-size: 11px; color: #666; text-align: center; }
        .bill-row-amount { font-size: 14px; font-weight: 700; color: #000; text-align: right; }

        /* Form */
        .form-item { margin-bottom: 12px; }
        .form-label { display: block; margin-bottom: 5px; font-weight: 700; color: #000; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .form-input, .form-select {
            width: 100%; padding: 10px 12px;
            border: none; border-bottom: 2px solid #000;
            font-size: 14px; background: transparent; color: #000;
            font-family: 'Courier New', monospace; transition: all 0.3s;
        }
        .form-input:focus, .form-select:focus { outline: none; border-bottom-color: #3498db; background: rgba(52, 152, 219, 0.05); }
        .form-select option { background: #fff; color: #000; }

        .radio-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .radio-item input[type="radio"] { display: none; }
        .radio-label {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 10px; background: #f5f5f5; border: 2px solid #000;
            color: #000; cursor: pointer; transition: all 0.3s;
            font-weight: 600; font-size: 12px; text-transform: uppercase;
        }
        .radio-item input[type="radio"]:checked + .radio-label { background: #000; color: #fff; }
        .radio-label:hover { background: #e0e0e0; }

        .amount-wrapper { position: relative; border: 2px dashed #000; padding: 12px; background: #fffef7; }
        .currency-symbol { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #000; font-size: 24px; font-weight: 700; }
        .amount-input { padding-left: 40px !important; font-size: 24px; font-weight: 700; color: #000 !important; border: none !important; background: transparent !important; text-align: right; }
        .amount-input::placeholder { color: #ccc; }
        .amount-input::-webkit-inner-spin-button, .amount-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .receipt-divider { border-top: 2px dashed #000; margin: 12px 0; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .btn {
            padding: 12px 14px; border: 2px solid #000;
            font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.3s; text-transform: uppercase; letter-spacing: 1px;
            font-family: 'Courier New', monospace; background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn:hover { background: #000; color: #fff; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: #000; color: #fff; }
        .btn-primary:hover { background: #333; }
        .btn-success { background: #27ae60; color: #fff; border-color: #27ae60; }
        .btn-success:hover { background: #2ecc71; border-color: #2ecc71; }
        .btn-danger { background: #c0392b; color: #fff; border-color: #c0392b; }
        .btn-danger:hover { background: #e74c3c; border-color: #e74c3c; }
        .btn-sm { padding: 8px 12px; font-size: 11px; }

        /* Stats */
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .stat-card { background: #f5f5f5; border: 2px solid #000; padding: 10px; text-align: center; }
        .stat-value { font-size: 20px; font-weight: 700; color: #000; }
        .stat-value.success { color: #27ae60; }
        .stat-value.warning { color: #f39c12; }
        .stat-label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 2px; letter-spacing: 0.5px; }

        /* Empty & Loading */
        .empty-state { text-align: center; padding: 30px 15px; color: #999; }
        .empty-state i { font-size: 50px; margin-bottom: 10px; }
        .empty-state p { font-size: 14px; }
        .loading { text-align: center; padding: 30px; color: #999; }
        .loading i { font-size: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Pagination */
        .pagination { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 12px; padding-top: 10px; border-top: 1px dashed #ccc; }
        .pagination button {
            background: #fff; border: 2px solid #000; color: #000;
            padding: 6px 12px; cursor: pointer; font-family: 'Courier New', monospace;
            font-weight: 700; font-size: 12px; transition: all 0.3s;
        }
        .pagination button:hover:not(:disabled) { background: #000; color: #fff; }
        .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
        .pagination span { color: #666; font-size: 12px; }

        .receipt-date { text-align: right; font-size: 11px; color: #666; margin-bottom: 8px; }

        /* Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* background: rgba(0,0,0,0.7); z-index: 10000; */
        }
        .modal.show { display: block; }
        .modal-content {
            background: #fff; border: 2px solid #000; padding: 20px; width: 480px;
            max-height: 80vh; overflow-y: auto;
            position: fixed;
            left: 65%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: modalSlideIn 0.3s ease;
        }
        @keyframes modalSlideIn {
            from { 
                transform: translate(-50%, -50%) translateY(30px);
                opacity: 0;
            }
            to { 
                transform: translate(-50%, -50%) translateY(0);
                opacity: 1;
            }
        }
        .modal-title {
            font-size: 16px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 8px; color: #000;
            padding-bottom: 10px; border-bottom: 2px dashed #000;
        }
        .modal-title i { color: #3498db; font-size: 18px; }
        .modal-title.danger i { color: #c0392b; }
        .modal-footer { display: flex; gap: 8px; margin-top: 15px; }
        .modal-footer .btn { flex: 1; }

        /* Detail Modal Content */
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dotted #ccc; }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { font-size: 12px; color: #666; text-transform: uppercase; }
        .detail-value { font-size: 14px; color: #000; font-weight: 600; text-align: right; }
        .detail-amount { font-size: 28px; font-weight: 700; text-align: center; padding: 15px 0; border: 2px dashed #000; margin: 10px 0; background: #fffef7; }
        .detail-status {
            display: inline-block; padding: 5px 12px; font-size: 11px;
            font-weight: 700; text-transform: uppercase;
        }
        .detail-status.pending { background: #f39c12; color: #fff; }
        .detail-status.paid { background: #27ae60; color: #fff; }
        .detail-status.rejected { background: #c0392b; color: #fff; }
        .detail-status.cancelled { background: #95a5a6; color: #fff; }
        .detail-status.auto_paid { background: #3498db; color: #fff; }

        .cancel-reason-box {
            margin-top: 10px; padding: 10px; background: rgba(192, 57, 43, 0.1);
            border-left: 3px solid #c0392b; font-size: 12px; color: #c0392b;
        }

        /* Bill Card cho tab Pending */
        .bill-card {
            background: #fffef7; border: 2px solid #000; padding: 12px; margin-bottom: 10px;
        }
        .bill-card-header { font-size: 15px;display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .bill-card-id { font-size: 13px; font-weight: 700; }
        .bill-card-status { font-size: 11px; padding: 4px 10px; font-weight: 700; text-transform: uppercase; background: #f39c12; color: #fff; }
        .bill-card-info { font-size: 15px; color: #333; margin-bottom: 5px; }
        .bill-card-info span { color: #666; }
        .bill-card-amount { font-size: 24px; font-weight: 700; text-align: right; border-top: 1px dashed #000; padding-top: 8px; margin-top: 8px; }
        .bill-card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .bill-card-actions .btn { flex: 1; }
        .due-warning { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #f39c12; margin-top: 5px; font-weight: 600; }
        .due-warning.urgent { color: #c0392b; }
    </style>
</head>
<body>
    <div id="billingContainer" class="billing-container">
        <button class="close-btn" onclick="closeMenu()"><i class="fas fa-times"></i></button>

        <div class="receipt-paper">
            <div class="billing-header">
                <div class="billing-title">HÓA ĐƠN</div>
                <div class="billing-subtitle" id="headerSubtitle">THANH TOÁN</div>
            </div>
            <div class="receipt-date" id="receiptDate"></div>

            <div class="tabs">
                <button class="tab active" data-tab="pending" id="tabPending">
                    <i class="fas fa-inbox"></i>
                    <span>Cần Trả</span>
                    <span class="tab-badge" id="pendingCount" style="display:none">0</span>
                </button>
                <button class="tab" data-tab="history" id="tabHistory">
                    <i class="fas fa-history"></i>
                    <span>Lịch Sử</span>
                </button>
                <button class="tab hidden" data-tab="create" id="tabCreate">
                    <i class="fas fa-pen"></i>
                    <span>Viết</span>
                </button>
                <button class="tab hidden" data-tab="mybills" id="tabMyBills">
                    <i class="fas fa-file-alt"></i>
                    <span>Đã Viết</span>
                </button>
                <button class="tab hidden" data-tab="company" id="tabCompany">
                    <i class="fas fa-building"></i>
                    <span>Công Ty</span>
                </button>
            </div>

            <!-- Tab: Pending -->
            <div class="tab-content active" id="contentPending">
                <div id="pendingBillList"></div>
                <div class="pagination" id="pendingPagination"></div>
            </div>

            <!-- Tab: History -->
            <div class="tab-content" id="contentHistory">
                <div class="filter-bar">
                    <input type="text" class="filter-input" id="historySearch" placeholder="Tìm theo tên..." oninput="filterHistory()">
                    <select class="filter-select" id="historyStatus" onchange="filterHistory()">
                        <option value="">Tất cả</option>
                        <option value="paid">Đã Thanh Toán</option>
                        <option value="rejected">Từ chối</option>
                        <option value="auto_paid">Tự động</option>
                    </select>
                </div>
                <div class="bill-list-compact" id="historyBillList"></div>
                <div class="pagination" id="historyPagination"></div>
            </div>

            <!-- Tab: Create -->
            <div class="tab-content" id="contentCreate">
                <div class="form-item">
                    <label class="form-label">Khách Hàng</label>
                    <select id="customerSelect" class="form-select">
                        <option value="">-- Chọn khách hàng --</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">Phương thức thanh toán</label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="payment" value="cash" id="cashRadio" checked>
                            <label for="cashRadio" class="radio-label"><span>Tiền Mặt</span></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="payment" value="bank" id="bankRadio">
                            <label for="bankRadio" class="radio-label"><span>Ngân Hàng</span></label>
                        </div>
                    </div>
                </div>
                <div class="form-item">
                    <label class="form-label">Lý Do</label>
                    <input type="text" id="reasonInput" class="form-input" placeholder="VD: Sửa xe, Khám bệnh,...">
                </div>
                <div class="receipt-divider"></div>
                <div class="form-item">
                    <label class="form-label">Số Tiền</label>
                    <div class="amount-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="amountInput" class="form-input amount-input" placeholder="0" min="1">
                    </div>
                </div>
                <div class="receipt-divider"></div>
                <div class="btn-group">
                    <button class="btn" onclick="refreshNearbyPlayers()"><i class="fas fa-sync-alt"></i> Làm Mới</button>
                    <button class="btn btn-primary" onclick="createBill()"><i class="fas fa-paper-plane"></i> Gửi</button>
                </div>
            </div>

            <!-- Tab: My Bills -->
            <div class="tab-content" id="contentMybills">
                <div class="filter-bar">
                    <input type="text" class="filter-input" id="mybillsSearch" placeholder="Tìm theo tên KH..." oninput="filterMyBills()">
                    <select class="filter-select" id="mybillsStatus" onchange="filterMyBills()">
                        <option value="">Tất cả</option>
                        <option value="pending">Chờ Thanh Toán</option>
                        <option value="paid">Đã Thanh Toán</option>
                        <option value="rejected">Từ chối</option>
                        <option value="cancelled">Đã hủy</option>
                    </select>
                </div>
                <div class="bill-list-compact" id="myBillsList"></div>
                <div class="pagination" id="myBillsPagination"></div>
            </div>

            <!-- Tab: Company -->
            <div class="tab-content" id="contentCompany">
                <div class="stats-grid" id="companyStats"></div>
                <div class="filter-bar">
                    <input type="text" class="filter-input" id="companySearch" placeholder="Tìm theo tên..." oninput="filterCompany()">
                    <select class="filter-select" id="companyStatus" onchange="filterCompany()">
                        <option value="">Tất cả</option>
                        <option value="pending">Chờ Thanh Toán</option>
                        <option value="paid">Đã Thanh Toán</option>
                        <option value="rejected">Từ chối</option>
                        <option value="cancelled">Đã hủy</option>
                    </select>
                </div>
                <div class="bill-list-compact" id="companyBillList"></div>
                <div class="pagination" id="companyPagination"></div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-title"><i class="fas fa-file-invoice"></i> Chi Tiết Hóa Đơn</div>
            <div id="detailContent"></div>
            <div class="modal-footer" id="detailFooter"></div>
        </div>
    </div>

    <!-- Cancel Modal -->
    <div id="cancelModal" class="modal">
        <div class="modal-content">
            <div class="modal-title danger"><i class="fas fa-ban"></i> Hủy Hóa Đơn</div>
            <div class="form-item">
                <label class="form-label">Lý do hủy (bắt buộc)</label>
                <input type="text" id="cancelReason" class="form-input" placeholder="Nhập lý do hủy...">
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeCancelModal()">Đóng</button>
                <button class="btn btn-danger" onclick="confirmCancel()">Xác Nhận</button>
            </div>
        </div>
    </div>

    <script>
        let uiData = null;
        let currentPages = { pending: 1, history: 1, mybills: 1, company: 1 };
        let allBills = { history: [], mybills: [], company: [] };
        let cancelBillId = null;
        let currentDetailBill = null;

        function post(endpoint, data) {
            return fetch(`https://tommy-billing/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data || {})
            }).then(resp => resp.json()).catch(() => ({}));
        }

        function formatMoney(amount) { return '$' + parseInt(amount).toLocaleString('en-US'); }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN', {day: '2-digit', month: '2-digit'});
        }

        function formatDateFull(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('vi-VN') + ' ' + date.toLocaleTimeString('vi-VN', {hour: '2-digit', minute: '2-digit'});
        }

        function getStatusText(status) {
            const texts = { 'pending': 'Chờ Thanh Toán', 'paid': 'Đã Thanh Toán', 'rejected': 'Từ chối', 'cancelled': 'Đã hủy', 'auto_paid': 'Tự động' };
            return texts[status] || status;
        }

        function getDaysUntilDue(dueDate) {
            if (!dueDate) return null;
            const due = new Date(dueDate);
            const now = new Date();
            return Math.ceil((due - now) / (1000 * 60 * 60 * 24));
        }

        function updateDateTime() {
            const now = new Date();
            document.getElementById('receiptDate').textContent = now.toLocaleDateString('vi-VN') + ' ' + now.toLocaleTimeString('vi-VN', {hour: '2-digit', minute: '2-digit'});
        }

        // ==================== TABS ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => switchTab(tab.dataset.tab));
        });

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById('content' + tabName.charAt(0).toUpperCase() + tabName.slice(1)).classList.add('active');
            
            if (tabName === 'pending') loadPendingBills();
            else if (tabName === 'history') loadHistory();
            else if (tabName === 'mybills') loadMyBills();
            else if (tabName === 'company') loadCompanyBills();
        }

        // ==================== PENDING (Full card) ====================
        function loadPendingBills() {
            const container = document.getElementById('pendingBillList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

            post('getPendingBills', { page: currentPages.pending }).then(data => {
                const bills = data.bills || [];
                const badge = document.getElementById('pendingCount');
                if (data.total > 0) { badge.textContent = data.total; badge.style.display = 'inline'; }
                else { badge.style.display = 'none'; }

                if (bills.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-check-circle"></i><p>Không có hóa đơn cần thanh toán</p></div>';
                    return;
                }

                container.innerHTML = bills.map(bill => {
                    const daysLeft = getDaysUntilDue(bill.due_date);
                    let dueWarning = '';
                    if (daysLeft !== null) {
                        if (daysLeft <= 0) dueWarning = `<div class="due-warning urgent"><i class="fas fa-exclamation-triangle"></i> Quá hạn!</div>`;
                        else if (daysLeft <= 2) dueWarning = `<div class="due-warning urgent"><i class="fas fa-clock"></i> Còn ${daysLeft} ngày</div>`;
                        else dueWarning = `<div class="due-warning"><i class="fas fa-clock"></i> Còn ${daysLeft} ngày</div>`;
                    }
                    return `
                        <div class="bill-card">
                            <div class="bill-card-header">
                                <span class="bill-card-id">${bill.bill_id}</span>
                                <span class="bill-card-status">Chờ Thanh Toán</span>
                            </div>
                            <div class="bill-card-info"><span>Từ:</span> ${bill.biller_name} - ${bill.biller_job_label}</div>
                            <div class="bill-card-info"><span>Lý do:</span> ${bill.reason}</div>
                            <div class="bill-card-amount">${formatMoney(bill.amount)}</div>
                            ${dueWarning}
                            <div class="bill-card-actions">
                                <button class="btn btn-success btn-sm" onclick="payBill('${bill.bill_id}')"><i class="fas fa-check"></i> Thanh Toán</button>
                                <button class="btn btn-danger btn-sm" onclick="rejectBill('${bill.bill_id}')"><i class="fas fa-times"></i> Từ Chối</button>
                            </div>
                        </div>
                    `;
                }).join('');

                renderPagination('pendingPagination', currentPages.pending, Math.ceil(data.total / 10), 'pending');
            });
        }

        // ==================== COMPACT LIST ====================
        function renderCompactList(container, bills, type) {
            if (!bills || bills.length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-file-invoice"></i><p>Không có hóa đơn</p></div>';
                return;
            }

            container.innerHTML = bills.map(bill => {
                const name = (type === 'history') ? bill.biller_name : bill.target_name;
                return `
                    <div class="bill-row ${bill.status}" onclick="showDetail('${type}', '${bill.bill_id}')">
                        <span class="bill-row-id">${bill.bill_id}</span>
                        <span class="bill-row-name">${name}</span>
                        <span class="bill-row-date">${formatDate(bill.created_at)}</span>
                        <span class="bill-row-amount">${formatMoney(bill.amount)}</span>
                    </div>
                `;
            }).join('');
        }

        // ==================== HISTORY ====================
        function loadHistory() {
            const container = document.getElementById('historyBillList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

            post('getMyHistory', { page: currentPages.history }).then(data => {
                allBills.history = data.bills || [];
                filterHistory();
                renderPagination('historyPagination', currentPages.history, Math.ceil(data.total / 10), 'history');
            });
        }

        function filterHistory() {
            const search = document.getElementById('historySearch').value.toLowerCase();
            const status = document.getElementById('historyStatus').value;
            const filtered = allBills.history.filter(bill => {
                const matchName = bill.biller_name.toLowerCase().includes(search);
                const matchStatus = !status || bill.status === status;
                return matchName && matchStatus;
            });
            renderCompactList(document.getElementById('historyBillList'), filtered, 'history');
        }

        // ==================== MY BILLS ====================
        function loadMyBills() {
            const container = document.getElementById('myBillsList');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

            post('getMyCreatedBills', { page: currentPages.mybills }).then(data => {
                allBills.mybills = data.bills || [];
                filterMyBills();
                renderPagination('myBillsPagination', currentPages.mybills, Math.ceil(data.total / 10), 'mybills');
            });
        }

        function filterMyBills() {
            const search = document.getElementById('mybillsSearch').value.toLowerCase();
            const status = document.getElementById('mybillsStatus').value;
            const filtered = allBills.mybills.filter(bill => {
                const matchName = bill.target_name.toLowerCase().includes(search);
                const matchStatus = !status || bill.status === status;
                return matchName && matchStatus;
            });
            renderCompactList(document.getElementById('myBillsList'), filtered, 'mybills');
        }

        // ==================== COMPANY ====================
        function loadCompanyBills() {
            const container = document.getElementById('companyBillList');
            const statsContainer = document.getElementById('companyStats');
            container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

            post('getCompanyBills', { page: currentPages.company }).then(data => {
                const stats = data.stats || {};
                statsContainer.innerHTML = `
                    <div class="stat-card"><div class="stat-value">${formatMoney(stats.total_revenue || 0)}</div><div class="stat-label">Doanh Thu</div></div>
                    <div class="stat-card"><div class="stat-value">${formatMoney(stats.total_society || 0)}</div><div class="stat-label">Công Ty</div></div>
                    <div class="stat-card"><div class="stat-value success">${stats.paid_count || 0}</div><div class="stat-label">Đã Thanh Toán</div></div>
                    <div class="stat-card"><div class="stat-value warning">${stats.pending_count || 0}</div><div class="stat-label">Chờ Thanh Toán</div></div>
                `;
                allBills.company = data.bills || [];
                filterCompany();
                renderPagination('companyPagination', currentPages.company, Math.ceil(data.total / 10), 'company');
            });
        }

        function filterCompany() {
            const search = document.getElementById('companySearch').value.toLowerCase();
            const status = document.getElementById('companyStatus').value;
            const filtered = allBills.company.filter(bill => {
                const matchName = bill.target_name.toLowerCase().includes(search) || bill.biller_name.toLowerCase().includes(search);
                const matchStatus = !status || bill.status === status;
                return matchName && matchStatus;
            });
            renderCompactList(document.getElementById('companyBillList'), filtered, 'company');
        }

        // ==================== DETAIL MODAL ====================
        function showDetail(type, billId) {
            const bills = allBills[type] || [];
            const bill = bills.find(b => b.bill_id === billId);
            if (!bill) return;

            currentDetailBill = bill;
            const content = document.getElementById('detailContent');
            const footer = document.getElementById('detailFooter');

            const cancelInfo = bill.cancel_reason ? `<div class="cancel-reason-box"><i class="fas fa-info-circle"></i> Lý do hủy: ${bill.cancel_reason}</div>` : '';

            content.innerHTML = `
                <div class="detail-row"><span class="detail-label">Mã HỢP ĐỒNG</span><span class="detail-value">${bill.bill_id}</span></div>
                <div class="detail-row"><span class="detail-label">Trạng thái</span><span class="detail-value"><span class="detail-status ${bill.status}">${getStatusText(bill.status)}</span></span></div>
                <div class="detail-row"><span class="detail-label">${type === 'history' ? 'Nhân viên' : 'Khách hàng'}</span><span class="detail-value">${type === 'history' ? bill.biller_name : bill.target_name}</span></div>
                <div class="detail-row"><span class="detail-label">Công ty</span><span class="detail-value">${bill.biller_job_label}</span></div>
                <div class="detail-row"><span class="detail-label">Lý do</span><span class="detail-value">${bill.reason}</span></div>
                <div class="detail-row"><span class="detail-label">Phương thức</span><span class="detail-value">${bill.payment_method === 'cash' ? 'Tiền mặt' : 'Ngân hàng'}</span></div>
                <div class="detail-row"><span class="detail-label">Ngày tạo</span><span class="detail-value">${formatDateFull(bill.created_at)}</span></div>
                ${bill.updated_at ? `<div class="detail-row"><span class="detail-label">Cập nhật</span><span class="detail-value">${formatDateFull(bill.updated_at)}</span></div>` : ''}
                <div class="detail-amount">${formatMoney(bill.amount)}</div>
                ${cancelInfo}
            `;

            if (type === 'mybills' && bill.status === 'pending') {
                footer.innerHTML = `
                    <button class="btn" onclick="closeDetailModal()">Đóng</button>
                    <button class="btn btn-danger" onclick="closeDetailModal(); openCancelModal('${bill.bill_id}')"><i class="fas fa-ban"></i> Hủy Bill</button>
                `;
            } else {
                footer.innerHTML = `<button class="btn btn-primary" onclick="closeDetailModal()" style="width:100%">Đóng</button>`;
            }

            document.getElementById('detailModal').classList.add('show');
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('show');
            currentDetailBill = null;
        }

        // ==================== PAGINATION ====================
        function renderPagination(containerId, currentPage, totalPages, type) {
            const container = document.getElementById(containerId);
            if (totalPages <= 1) { container.innerHTML = ''; return; }
            container.innerHTML = `
                <button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage('${type}', ${currentPage - 1})"><i class="fas fa-chevron-left"></i></button>
                <span>${currentPage} / ${totalPages}</span>
                <button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage('${type}', ${currentPage + 1})"><i class="fas fa-chevron-right"></i></button>
            `;
        }

        function changePage(type, page) {
            currentPages[type] = page;
            if (type === 'pending') loadPendingBills();
            else if (type === 'history') loadHistory();
            else if (type === 'mybills') loadMyBills();
            else if (type === 'company') loadCompanyBills();
        }

        // ==================== CREATE BILL ====================
        function refreshNearbyPlayers() {
            const select = document.getElementById('customerSelect');
            select.innerHTML = '<option value="">Đang tải...</option>';
            post('getNearbyPlayers').then(players => {
                select.innerHTML = '<option value="">-- Chọn khách hàng --</option>';
                players.forEach(p => { select.innerHTML += `<option value="${p.id}">${p.name} [${p.id}]</option>`; });
            });
        }

        function createBill() {
            const targetId = document.getElementById('customerSelect').value;
            const amount = parseInt(document.getElementById('amountInput').value);
            const accountType = document.querySelector('input[name="payment"]:checked').value;
            const reason = document.getElementById('reasonInput').value.trim();

            if (!targetId) { post('notify', { message: 'Vui lòng chọn khách hàng!', type: 'error' }); return; }
            if (!amount || amount <= 0) { post('notify', { message: 'Số tiền phải lớn hơn 0!', type: 'error' }); return; }

            post('createBill', { targetId: parseInt(targetId), amount, accountType, reason });
            document.getElementById('customerSelect').value = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('reasonInput').value = '';
            setTimeout(() => { if (uiData && uiData.canCreateBill) loadMyBills(); }, 500);
        }

        // ==================== BILL ACTIONS ====================
        function payBill(billId) { post('payBill', { billId }); setTimeout(loadPendingBills, 500); }
        function rejectBill(billId) { post('rejectBill', { billId }); setTimeout(loadPendingBills, 500); }

        function openCancelModal(billId) {
            cancelBillId = billId;
            document.getElementById('cancelReason').value = '';
            document.getElementById('cancelModal').classList.add('show');
        }

        function closeCancelModal() {
            cancelBillId = null;
            document.getElementById('cancelModal').classList.remove('show');
        }

        function confirmCancel() {
            const reason = document.getElementById('cancelReason').value.trim();
            if (!reason) { post('notify', { message: 'Vui lòng nhập lý do hủy!', type: 'error' }); return; }
            post('cancelBill', { billId: cancelBillId, reason });
            closeCancelModal();
            setTimeout(loadMyBills, 500);
        }

        // ==================== MENU ====================
        function openMenu(data) {
            uiData = data.uiData;
            updateDateTime();
            document.getElementById('headerSubtitle').textContent = uiData.canCreateBill ? (uiData.jobLabel || 'THANH TOÁN') : 'THANH TOÁN';
            document.getElementById('tabCreate').classList.toggle('hidden', !uiData.canCreateBill);
            document.getElementById('tabMyBills').classList.toggle('hidden', !uiData.canCreateBill);
            document.getElementById('tabCompany').classList.toggle('hidden', !uiData.isBoss);

            if (uiData.canCreateBill && data.nearbyPlayers) {
                const select = document.getElementById('customerSelect');
                select.innerHTML = '<option value="">-- Chọn khách hàng --</option>';
                data.nearbyPlayers.forEach(p => { select.innerHTML += `<option value="${p.id}">${p.name} [${p.id}]</option>`; });
            }

            switchTab('pending');
            document.getElementById('billingContainer').classList.add('show');
        }

        function closeMenu() {
            document.getElementById('billingContainer').classList.remove('show');
            post('closeMenu');
        }

        window.addEventListener('message', function(event) {
            if (event.data.action === 'openMenu') openMenu(event.data);
            else if (event.data.action === 'refreshBills') {
                loadPendingBills();
                loadHistory();
                if (uiData && uiData.canCreateBill) loadMyBills();
                if (uiData && uiData.isBoss) loadCompanyBills();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('detailModal').classList.contains('show')) closeDetailModal();
                else if (document.getElementById('cancelModal').classList.contains('show')) closeCancelModal();
                else closeMenu();
            }
        });

        document.getElementById('amountInput').addEventListener('input', function() { this.value = this.value.replace(/[^0-9]/g, ''); });
    </script>
</body>
</html>
