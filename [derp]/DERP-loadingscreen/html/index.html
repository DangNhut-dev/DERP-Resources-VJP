<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoogieLoadingScreen — FiveM</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- ── Background Video ──────────────────────── -->
    <video id="background-video" autoplay muted loop playsinline>
        <source src="assets/videos/video.mp4" type="video/mp4">
    </video>

    <!-- ── Overlay ───────────────────────────────── -->
    <div class="overlay"></div>

    <!-- ── Hero Title (center) ───────────────────── -->
    <div class="hero-title" id="heroTitle">
        <img class="hero-logo" id="heroLogo" src="" alt="Server Logo" style="display: none;">
        <h2 class="hero-name" id="heroName">WSPDoogie World</h2>
        <p class="hero-tagline" id="heroTagline">Welcome on the server!</p>
    </div>

    <!-- ── Progress Bar (top center) ─────────────── -->
    <div class="top-bar">
        <div class="progress-info">
            <span class="progress-status" id="progressStatus">Loading assets...</span>
            <span class="progress-pct" id="progressText">0%</span>
        </div>
        <div class="progress-track-top">
            <div class="progress-fill-top" id="progressBar"></div>
        </div>
    </div>

    <!-- ── Server Branding (top left) ────────────── -->
    <div class="server-branding">
        <h1 class="server-name" id="serverName">WSPDoogie World</h1>
        <p class="server-discord" id="serverDiscordText">discord.gg/wspdoogie</p>
    </div>

    <!-- ── Social Icons & FiveM Badge (top right) ── -->
    <div class="top-right">
        <div class="social-icons">
            <!-- Discord -->
            <a class="social-icon" id="socialDiscord" href="#" title="Discord">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z" />
                </svg>
            </a>
            <!-- YouTube -->
            <a class="social-icon" id="socialYoutube" href="#" title="YouTube">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z" />
                </svg>
            </a>
            <!-- TikTok -->
            <a class="social-icon" id="socialTiktok" href="#" title="TikTok">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M12.525.02c1.31-.02 2.61-.01 3.91-.02.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.05-2.89-.35-4.2-.97-.57-.26-1.1-.59-1.62-.93-.01 2.92.01 5.84-.02 8.75-.08 1.4-.54 2.79-1.35 3.94-1.31 1.92-3.58 3.17-5.91 3.21-1.43.08-2.86-.31-4.08-1.03-2.02-1.19-3.44-3.37-3.65-5.71-.02-.5-.03-1-.01-1.49.18-1.9 1.12-3.72 2.58-4.96 1.66-1.44 3.98-2.13 6.15-1.72.02 1.48-.04 2.96-.04 4.44-.99-.32-2.15-.23-3.02.37-.63.41-1.11 1.04-1.36 1.75-.21.51-.15 1.07-.14 1.61.24 1.64 1.82 3.02 3.5 2.87 1.12-.01 2.19-.66 2.77-1.61.19-.33.4-.67.41-1.06.1-1.79.06-3.57.07-5.36.01-4.03-.01-8.05.02-12.07z" />
                </svg>
            </a>
        </div>
        <span class="fivem-badge">FiveM</span>
    </div>

    <!-- ── Changelogs (left panel) ───────────────── -->
    <div class="changelog-panel" id="changelogPanel">
        <h2 class="changelog-title" id="changelogTitleText">Changelogs</h2>
        <div class="changelog-list" id="changelogList">
            <!-- Changelogs are injected here via JS -->
        </div>
    </div>

    <!-- ── Staff Panel (right panel) ───────────────── -->
    <div class="staff-panel" id="staffPanel">
        <h2 class="staff-title" id="staffTitleText">Team Staff</h2>
        <div class="staff-list" id="staffList">
            <!-- Staff members are injected here via JS -->
        </div>
    </div>

    <!-- ── Music Player (bottom center) ──────────── -->
    <div class="music-player" id="musicPlayer">
        <div class="music-art" id="musicArt">
            <img src="assets/covers/cover.jpg" alt="Cover">
        </div>
        <div class="music-info">
            <span class="music-title" id="musicTitle">Loading...</span>
            <span class="music-artist" id="musicArtist">—</span>
        </div>
        <span class="track-counter" id="trackCounter">1 / 1</span>
        <div class="music-controls">
            <button class="music-btn" id="volumeBtn" type="button" title="Volume">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                    <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
                </svg>
            </button>
            <button class="music-btn" id="toggleLogoBtn" type="button" title="Show/Hide Logo">
                <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16">
                    <path
                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                </svg>
            </button>
            <button class="music-btn" id="prevBtn" type="button" title="Previous">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z" />
                </svg>
            </button>
            <button class="music-btn music-btn--play" id="playPauseBtn" type="button" title="Play/Pause">
                <svg viewBox="0 0 24 24" fill="currentColor" id="playPauseIcon">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                </svg>
            </button>
            <button class="music-btn" id="nextBtn" type="button" title="Next">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z" />
                </svg>
            </button>
        </div>
    </div>

    <!-- ── Audio Element ─────────────────────────── -->
    <audio id="background-audio" preload="auto"></audio>

    <!-- ── Scripts (order matters) ───────────────── -->
    <script src="assets/js/config.js"></script>
    <script src="assets/js/playlist.js"></script>
    <script src="assets/js/script.js"></script>

</body>

</html>
