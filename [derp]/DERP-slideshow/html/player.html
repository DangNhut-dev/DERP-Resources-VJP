<!DOCTYPE html>
<html>
<head>
<style>
*{margin:0;padding:0}
body{background:#000;overflow:hidden;width:1550px;height:960px}
video{width:100%;height:100%;object-fit:contain}
</style>
</head>
<body>
<video id="v" autoplay loop muted playsinline></video>
<script>
const v=document.getElementById('v');
window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='play'){
    v.src=e.data.url;
    v.play().catch(()=>{});
  }
});
const p=new URLSearchParams(window.location.search);
const u=p.get('url');
if(u){v.src=u;v.play().catch(()=>{});}
</script>
</body>
</html>
