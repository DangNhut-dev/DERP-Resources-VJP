<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DERP Crafting System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="crafting-container" class="hidden">
        <div class="crafting-wrapper">
            <!-- Header -->
            <div class="crafting-header">
                <div class="header-content">
                    <i class="fas fa-tools"></i>
                    <h1 id="bench-title">HỆ THỐNG CHẾ TẠO</h1>
                </div>
                <button class="close-btn" onclick="closeCrafting()">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <div class="crafting-content">
                <!-- LEFT: RECIPES -->
                <div class="recipes-section">
                    <div class="section-header">
                        <i class="fas fa-scroll"></i>
                        <h2>CÔNG THỨC CHẾ TẠO</h2>
                    </div>
                    <div id="recipes-list" class="recipes-list"></div>
                </div>

                <!-- RIGHT: DETAILS -->
                <div class="details-section">
                    <div class="section-header">
                        <i class="fas fa-info-circle"></i>
                        <h2>CHI TIẾT</h2>
                    </div>
                    <div id="recipe-details" class="recipe-details">
                        <div class="no-selection">
                            <i class="fas fa-hand-pointer"></i>
                            <p>Chọn một công thức để xem chi tiết</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- CRAFTING OVERLAY -->
        <div id="crafting-overlay" class="crafting-overlay hidden">
            <div class="overlay-content">
                <div class="box-container">
                    <div class="box-3d">
                        <div class="box-face box-front"></div>
                        <div class="box-face box-back"></div>
                        <div class="box-face box-left"></div>
                        <div class="box-face box-right"></div>
                        <div class="box-face box-top"></div>
                        <div class="box-face box-bottom"></div>
                    </div>
                </div>

                <div class="crafting-info">
                    <h3 id="crafting-item-label">Đang chế tạo...</h3>
                    <div class="crafting-timer">
                        <i class="fas fa-clock"></i>
                        <span id="crafting-timer-text">0s</span>
                    </div>
                </div>

                <div class="progress-bar-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>

                <button class="cancel-craft-btn" onclick="cancelCrafting()">
                    <i class="fas fa-times-circle"></i>
                    HỦY CHẾ TẠO
                </button>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
